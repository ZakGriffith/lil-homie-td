<!DOCTYPE html>
<html><head><title>TD TODO</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { background: #0b0f1a; color: #dde; font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
  h1, h2, h3 { color: #7cc4ff; }
  h1 { border-bottom: 1px solid #2a3760; padding-bottom: 8px; }
  h2 { color: #9fd9ff; margin-top: 28px; }
  h3 { color: #7aa8cc; }
  a { color: #7cc4ff; }
  del { color: #556; }
  ul, ol { padding-left: 24px; }
  li { margin: 4px 0; line-height: 1.6; }
  input[type="checkbox"] { margin-right: 6px; }
  strong { color: #ffd84a; }
  code { background: #1a2040; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  #status { color: #556; font-size: 12px; margin-bottom: 12px; }
</style>
</head><body>
<div id="status">Loading...</div>
<div id="content"></div>
<script>
async function load() {
  try {
    const res = await fetch('/TODO.md?t=' + Date.now());
    const md = await res.text();
    document.getElementById('content').innerHTML = marked.parse(md);
    document.getElementById('status').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading TODO.md';
  }
}
load();
setInterval(load, 2000);
</script>
</body></html>
